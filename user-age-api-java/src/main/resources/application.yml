spring:
  application:
    name: user-age-api
  datasource:
    # MySQL connection. Override via env vars (DB_URL, DB_USER, DB_PASSWORD)
    # so the same JAR can run in dev / docker / prod without rebuilding.
    url: ${DB_URL:jdbc:mysql://localhost:3306/user_age_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true}
    username: root
    password: Naidu@123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate    # Flyway owns the schema; JPA only validates mappings
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false      # close the JPA session at the controller boundary
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${APP_PORT:8080}
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.example.userage: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"
